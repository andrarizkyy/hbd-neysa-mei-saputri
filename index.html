<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18th Happy Birthday | Neysa Mei Saputri</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & GLOBAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: #333;
            overflow-x: hidden;
            line-height: 1.6;
            background-color: #fdfcf0;
        }

        h1, h2, h3, .date {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        /* --- NAVIGASI MELAYANG --- */
        .floating-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .floating-nav ul {
            list-style: none;
            display: flex;
            gap: 15px;
        }

        .floating-nav a {
            text-decoration: none;
            color: #444;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .floating-nav a.active, .floating-nav a:hover {
            background: #fff;
            color: #ff8fab;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* --- STRUKTUR FULL SCREEN --- */
        .section {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }

        /* --- 1. HERO SECTION --- */
        .hero-image {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-text { position: absolute; color: white; }
        .hero-text.left { bottom: 8%; left: 5%; }
        .hero-text.right { top: 12%; right: 8%; }
        .hero h1 { font-size: 5rem; line-height: 1.1; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* --- 2. GRID GALLERY --- */
        .grid-gallery { background-color: #fff; }
        .gallery-container {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://picsum.photos/1000/1000?random=20');
            background-size: cover;
            background-position: center;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            transform: rotate(-2deg);
        }
        .grid-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* --- 3. MESSAGE SECTION --- */
        .message-section { 
            background: linear-gradient(180deg, #fffcf2 0%, #ffeef2 100%); 
        }

        /* Wrapper untuk menampung surat dan foto di luarnya */
        .message-layout {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 50px; /* Ruang untuk foto di bawah */
        }

        .paper {
            background: rgba(255, 255, 255, 0.85);
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 24px 24px;
            width: 100%; /* Lebar tetap sesuai container */
            height: 400px; /* Tinggi tetap persegi panjang */
            padding: 40px;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.03);
            border-radius: 20px;
            border-top: 6px solid #d4af37; 
            position: relative;
            z-index: 10;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }

        #text { 
            font-family: 'Poppins', sans-serif; 
            font-size: 1.1rem; 
            color: #4e342e; 
            line-height: 1.8; 
            text-align: left; 
        }

        /* FOTO DI LUAR SURAT (Pojok Kiri Bawah) */
        .info-photo-outside { 
            position: absolute;
            left: -30px;  /* Keluar sedikit ke kiri */
            bottom: -20px; /* Keluar sedikit ke bawah */
            width: 180px; 
            z-index: 20; /* Di atas paper */
        }
        .info-photo-outside img { 
            width: 100%; 
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: block;
        }

        .cursor { display: inline-block; width: 8px; height: 18px; background: #8d6e63; animation: blink 0.7s infinite; vertical-align: middle; }

        /* --- 4. ACHIEVEMENT --- */
        .achievement-section { background: linear-gradient(180deg, #ffeef2 0%, #ffdeeb 100%); }
        .text-block { width: 50%; }
        .photo-collage { width: 45%; position: relative; height: 350px; }
        .polaroid { background: white; padding: 15px 15px 35px 15px; position: absolute; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 220px; }
        .polaroid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .p-1 { top: 0; left: 0; transform: rotate(-10deg); z-index: 2; }
        .p-2 { bottom: 0; right: 0; transform: rotate(10deg); z-index: 1; }

        /* --- 5. FINAL --- */
        .final-image { position: absolute; width: 100%; height: 100%; z-index: -1; }
        .final-image img { width: 100%; height: 100%; object-fit: cover; }
        .final-text { text-align: center; color: white; }

        @keyframes blink { 50% { opacity: 0; } }
        .fade-in { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .fade-in.active { opacity: 1; transform: translateY(0); }

        /* --- RESPONSIVE HP --- */
        @media (max-width: 768px) {
            .section { height: auto; min-height: 100vh; padding: 60px 0; }
            .hero h1 { font-size: 3rem; }
            .message-layout { width: 90%; }
            .paper { height: 450px; padding: 25px; }
            #text { font-size: 0.95rem; }
            .info-photo-outside { 
                width: 140px; 
                left: -10px; 
                bottom: -30px; 
            }
            .gallery-container { grid-template-columns: repeat(2, 1fr); transform: none; }
            .achievement-section .container { display: flex; flex-direction: column; gap: 40px; }
            .text-block, .photo-collage { width: 100%; }
            .photo-collage { height: 300px; }
            .polaroid { width: 160px; }
        }
    </style>
</head>
<body>

    <nav class="floating-nav">
        <ul>
            <li><a href="#hero" class="nav-link">Hero</a></li>
            <li><a href="#gallery" class="nav-link">Gallery</a></li>
            <li><a href="#info" class="nav-link">Message</a></li>
            <li><a href="#achievement" class="nav-link">Story</a></li>
            <li><a href="#final" class="nav-link">Final</a></li>
        </ul>
    </nav>

    <section id="hero" class="section hero">
        <div class="hero-image"><img src="1775930173321.jpg" alt="Hero"></div>
        <div class="hero-text left">
            <h1>HAPPY<br>BIRTHDAY!</h1>
            <p class="date">2 Mei 2008 - 2 Mei 2026</p>
        </div>
        <div class="hero-text right"><h1>18<sup>th</sup></h1></div>
    </section>

    <section id="gallery" class="section grid-gallery">
        <div class="gallery-container fade-in">
            <div class="grid-item"><img src="m1.jpeg"></div>
            <div class="grid-item"><img src="m2.jpeg"></div>
            <div class="grid-item"><img src="m3.jpeg"></div>
            <div class="grid-item"><img src="m4.jpeg"></div>
            <div class="grid-item"><img src="m5.jpeg"></div>
            <div class="grid-item"><img src="IMG-20251103-WA0024.jpg"></div>
        </div>
    </section>

    <section id="info" class="section message-section">
        <div class="container">
            <div class="fade-in" style="text-align: center;">
                <h2 style="color: #6d4c41; font-size: 2.2rem; margin-bottom: 10px;">met ultahhhh anak comellll</h2>
                
                <div class="message-layout">
                    <div class="paper">
                        <div id="text"></div>
                        <span class="cursor"></span>
                    </div>

                    <div class="info-photo-outside fade-in">
                        <img src="05d7196b-1321-47dc-a325-fc327ab16ab8_20260422_001140_0000.png" alt="Mei">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="achievement" class="section achievement-section">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
            <div class="text-block fade-in">
                <h2 style="color: #db7093;">Rank 2 Through Consistency!!</h2>
                <div style="background: white; padding: 20px; border-radius: 15px; border-top: 5px solid #ffb6c1; margin-top: 15px;">
                    <p style="color: #6d4c41;">Selaaaamaat Yaaaw. Aku G Kaget Sihhh soalnya kamu selalu konsisten soal nilai HEBAATT!</p>
                </div>
            </div>
            <div class="photo-collage fade-in">
                <div class="polaroid p-1"><img src="https://picsum.photos/300/300?random=11"></div>
                <div class="polaroid p-2"><img src="https://picsum.photos/300/300?random=12"></div>
            </div>
        </div>
    </section>

    <section id="final" class="section final-hero">
        <div class="final-image"><img src="IMG-20251103-WA0024.jpg" alt="Final"></div>
        <div class="final-text fade-in">
            <h1 style="font-size: 4rem;">Happy Birthday!!</h1>
            <p style="font-size: 1.5rem; letter-spacing: 2px;">Neysa Mei Saputri</p>
        </div>
    </section>

    <script>
        const message = "Hai meiiii yang cantikk, imup dan menggemaskannn,\n\nmet ultahh yaaaa, btw ini kali kedua aku ngerayain ultah kamuuu(walaupun kecil-kecilan hehehehehe) semoga ada kali ketiga, keempat dan seterusnyaaa. Hindia said \"Segala doa yang baik adanya, untukmu dan mimpimu yang mulia.\" kalo inii versi akuuuu, di usia yang semakin serius iniii, semoga kamu menjadi pribadi yang lebih baikk, dilancarkan rezeki nyaa, dimudahkan segala urusan nyaa, diberi umur yang barokahh, semoga semua yang pengen kamu capai bisa tercapaii, tetap jadi anak perempuan yang baikk hatii yaaa, meski sekarang udah 18 tahun, kamu haruss tetep jadi mei yang baik hatii, imup, comell yang aku kenall. Pokonyaa yang baik baikk, jangan aneh-anehh, biar aku aja yang anehh wkwkwk. Makasihh yaa kamu udah lahir di dunia inii, mungkin kamu salah satu alasan kenapa aku dulu ngeiyain pertanyaan sebelum lahir di duniaa, I`m very lucky to know youu. Pokonya aku doakan yang terbaik buat kamuuu. mungkin segituu ajaa, aku ga pandai rangkai kata-kata wkkwkwkwkwk";
        
        let i = 0;
        let typewriterTimeout;

        function typeWriter() {
            if (i < message.length) {
                const char = message.charAt(i);
                document.getElementById("text").innerHTML += char === '\n' ? '<br>' : char;
                i++;
                typewriterTimeout = setTimeout(typeWriter, 40);
            }
        }

        function resetTypewriter() {
            clearTimeout(typewriterTimeout);
            i = 0;
            const textEl = document.getElementById("text");
            if(textEl) textEl.innerHTML = "";
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    if(entry.target.id === 'info') {
                        resetTypewriter();
                        typeWriter();
                    }
                }
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.fade-in, section').forEach(el => observer.observe(el));

        window.addEventListener('scroll', () => {
            let current = "";
            document.querySelectorAll('.section').forEach(section => {
                if (pageYOffset >= section.offsetTop - 300) current = section.getAttribute('id');
            });
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href').includes(current)) link.classList.add('active');
            });
        });
    </script>
</body>
</html>
